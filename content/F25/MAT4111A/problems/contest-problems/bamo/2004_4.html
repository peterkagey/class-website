<blockquote>
  <p>
    Suppose one is given $n$ real number, not all zero, but such that their sum is zero. Prove that one can label these numbers $a_1, a_2, \dots, a_n$ in such a manner that
    $$a_1a_2 + a_2a_3 + \dots + a_{n-1}a_n + a_n a_1 < 0.$$
  </p>
  <cite>
    2004 Bay Area Mathematical Olympiad (BAMO), <a href="https://www.bamo.org/archives/examfiles/bamo2004examsol.pdf">Problem 4</a>.
  </cite>
</blockquote>
